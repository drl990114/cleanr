id = "builtin-system"
name = "Built-in system cleanup locations"
version = "0.9.0"
description = "Known user-level system cleanup candidates such as browser caches, app caches, logs, temporary files, and large downloads."
categories = ["browser-cache", "application-cache", "temporary-files", "logs", "downloads"]

[[rules]]
id = "chrome-cache-directory"
label = "Chrome cache directory"
category = "browser-cache"
match = { kind = "directory", path_glob = "**/Google/Chrome/**/{Cache,Code Cache,GPUCache,DawnCache,ShaderCache}", min_size = 1048576 }
confidence = "high"
default_selected = true
action = "trash"
reason = "Chrome cache directories contain downloaded web resources that Chrome recreates automatically."
risk_note = "This does not target browser profiles, history, cookies, or saved sessions; the next browser launch may need to redownload cached content."

