[[rules]]
id = "macos-application-cache-directory"
label = "macOS application cache directory"
category = "application-cache"
match = { kind = "directory", path_glob = "**/Library/Caches/*", min_size = 10485760 }
confidence = "medium"
default_selected = false
action = "trash"
reason = "Application cache directories often contain rebuildable data, but ownership varies by app."
risk_note = "Review before cleaning; some apps may keep useful offline data or local working state in cache folders."

[[rules]]
id = "linux-application-cache-directory"
label = "Linux application cache directory"
category = "application-cache"
match = { kind = "directory", path_glob = "**/.cache/*", min_size = 10485760 }
confidence = "medium"
default_selected = false
action = "trash"
reason = "Application cache directories often contain rebuildable data, but ownership varies by app."
risk_note = "Review before cleaning; some apps may keep useful offline data or local working state in cache folders."

[[rules]]
id = "large-temporary-file"
label = "Large temporary file"
category = "temporary-files"
match = { kind = "file", extension = "tmp", min_size = 10485760 }
confidence = "medium"
default_selected = false
action = "trash"
reason = "Large temporary files are often leftovers from installers, editors, or application work."
risk_note = "Review the path first; an active application may still rely on a temporary file."

[[rules]]
id = "large-log-file"
label = "Large log file"
category = "logs"
match = { kind = "file", extension = "log", min_size = 52428800 }
confidence = "medium"
default_selected = false
action = "trash"
reason = "Large log files can usually be removed when they are no longer needed for debugging."
risk_note = "Logs may be needed for troubleshooting, auditing, or support requests."

[[rules]]
id = "large-download-file"
label = "Large downloaded file"
category = "downloads"
match = { kind = "file", path_glob = "**/Downloads/**", min_size = 104857600 }
confidence = "low"
default_selected = false
action = "trash"
reason = "Large files in Downloads may be installers, archives, or exports that are no longer needed."
risk_note = "Downloads are user data; inspect each file before cleaning."
