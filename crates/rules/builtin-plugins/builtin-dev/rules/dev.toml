risk_note = "Future pnpm installs may need network access."

[[rules]]
id = "windows-npm-cache"
label = "npm cache"
category = "package-cache"
match = { dir_name = "npm-cache", min_size = 1048576 }
confidence = "high"
default_selected = true
action = "trash"
reason = "The npm cache contains downloaded package data that npm can recreate."
risk_note = "Future npm installs may need network access."

[[rules]]
id = "gradle-cache"
