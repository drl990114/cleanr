id = "builtin-dev"
name = "Built-in developer caches"
version = "0.10.0"
description = "Generated dependencies, build artifacts, and review-required data for developer projects."
categories = ["developer-cache", "build-cache", "package-cache"]

# Cross-stack project artifact paths were audited against the MIT-licensed
# https://github.com/tbillington/kondo source at commit
# 1d351ca80b3d3adfad9bbe7db872c27359190210. Confidence, selection, and risk
# semantics below are Cleanr-specific; intentionally created `.venv` directories
# are excluded.

[[rules]]
id = "node-modules"
label = "Node dependency directory"
category = "developer-cache"
match = { dir_name = "node_modules", min_size = 1048576 }
confidence = "high"
default_selected = true
action = "trash"
reason = "node_modules is a generated dependency directory that package managers can recreate."
risk_note = "Project dependencies will need to be reinstalled before the project can run again."

[[rules]]
id = "node-angular-cache"
label = "Angular project cache"
category = "build-cache"
match = { kind = "directory", min_size = 1048576, project = { marker_globs = ["package.json"], excluded_root_dir_globs = ["ios", "android"], artifact_paths = [".angular"] } }
confidence = "high"
default_selected = true
action = "trash"
reason = "The .angular directory contains generated Angular tooling and build cache data."
risk_note = "The next Angular build or development-server start may take longer."

[[rules]]
id = "react-native-android-build-cache"
label = "React Native Android build data"
