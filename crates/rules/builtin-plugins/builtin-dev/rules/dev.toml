confidence = "high"
default_selected = true
action = "trash"
reason = "Gradle caches downloaded dependencies and generated build metadata."
risk_note = "The next Gradle build may need network access and take longer."

[[rules]]
id = "maven-repository"
label = "Maven local repository"
