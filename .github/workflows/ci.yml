name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Build workspace
        run: cargo build --workspace --all-targets --all-features --locked

      - name: Validate generated schemas
        run: |
          cargo run --locked -p cleanr-cli -- plugin schema manifest >/dev/null
          cargo run --locked -p cleanr-cli -- plugin schema index >/dev/null
          cargo run --locked -p cleanr-cli -- plugin schema rules >/dev/null
          cargo run --locked -p cleanr-cli -- plugin schema language >/dev/null
          cargo run --locked -p cleanr-cli -- plugin schema config >/dev/null

      - name: Validate plugins
        run: |
          node .github/scripts/generate-plugin-index.mjs --check
          plugin_dirs=(
            crates/rules/builtin-plugins/builtin-dev
            crates/rules/builtin-plugins/builtin-general
          )
          for dir in plugins/*; do
            [ -f "$dir/plugin.toml" ] && plugin_dirs+=("$dir")
          done
          cargo run --locked -p cleanr-cli -- plugin validate "${plugin_dirs[@]}"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Build docs
        run: pnpm build
